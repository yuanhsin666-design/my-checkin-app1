<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可愛風雲端全員打卡系統</title>
    <!-- 載入 React 核心與 Babel (解析 JSX) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 載入樣式與圖標 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 載入 Firebase 10.x SDK (使用相容模式以確保在 HTML 中直接運行) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #FDF8F9; 
        }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #FDA4AF; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        /**
         * 重要：在單一 HTML 檔案中，不可使用 'import'。
         * 這裡使用 React 全域變數獲取 hooks。
         */
        const { useState, useEffect, useMemo } = React;

        // --- Firebase 初始化 ---
        // 確保 __firebase_config 變數已正確注入，若在本地測試請手動填寫 config 物件
        const firebaseConfig = JSON.parse(__firebase_config);
        
        // 檢查是否已初始化，避免重複初始化錯誤
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kawaii-unified-checkin-v4';

        const STAFF_MEMBERS = [
            { id: 'staff_01', name: '小葵 🌻', avatarColor: 'bg-pink-400' },
            { id: 'staff_02', name: '阿健 🛠️', avatarColor: 'bg-blue-400' },
            { id: 'staff_03', name: '星星 🌟', avatarColor: 'bg-yellow-400' },
            { id: 'staff_04', name: '妮妮 🎀', avatarColor: 'bg-purple-400' },
            { id: 'staff_05', name: '波波 🐶', avatarColor: 'bg-orange-400' },
        ];

        const LEAVE_TYPES = [
            { id: 'REST', label: '休', color: 'text-blue-500', bg: 'bg-blue-50' },
            { id: 'PERSONAL', label: '事', color: 'text-orange-500', bg: 'bg-orange-50' },
            { id: 'SICK', label: '病', color: 'text-red-500', bg: 'bg-red-50' },
            { id: 'LATE', label: '遲', color: 'text-rose-600', bg: 'bg-rose-50' },
            { id: 'OVERTIME', label: '加', color: 'text-emerald-600', bg: 'bg-emerald-50' },
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [allRecords, setAllRecords] = useState({});
            const [currentTime, setCurrentTime] = useState(new Date());
            const [activeStaff, setActiveStaff] = useState(STAFF_MEMBERS[0]);
            const [isActionLoading, setIsActionLoading] = useState(false);
            const [successMsg, setSuccessMsg] = useState('');

            // 1. 處理驗證
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { console.error("驗證失敗:", e); }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                });
                return () => unsubscribe();
            }, []);

            // 2. 監聽 Firestore 數據 (僅在用戶登入後)
            useEffect(() => {
                if (!user) return;
                
                const unsubs = STAFF_MEMBERS.map(staff => {
                    const collectionPath = `artifacts/${appId}/public/data/records_${staff.id}`;
                    return db.collection(collectionPath).onSnapshot(
                        snapshot => {
                            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            setAllRecords(prev => ({ ...prev, [staff.id]: data }));
                            setLoading(false);
                        },
                        error => {
                            console.error(`讀取 ${staff.name} 數據失敗:`, error);
                            setLoading(false);
                        }
                    );
                });
                return () => unsubs.forEach(unsub => unsub());
            }, [user]);

            // 3. 更新時鐘
            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // 今日統計計算
            const stats = useMemo(() => {
                const todayKey = new Date().toDateString();
                let work = 0, late = 0, leave = 0, none = 0;
                STAFF_MEMBERS.forEach(s => {
                    const rec = (allRecords[s.id] || []).find(r => r.dayKey === todayKey);
                    if (rec) {
                        if (rec.label === '上' || rec.label === '加') work++;
                        else if (rec.label === '遲') late++;
                        else leave++;
                    } else { none++; }
                });
                return { work, late, leave, none };
            }, [allRecords]);

            // 打卡處理
            const handleAction = async (type, label = '上') => {
                if (!user || isActionLoading) return;
                setIsActionLoading(true);
                const todayKey = new Date().toDateString();
                const docId = `${todayKey.replace(/\s+/g, '-')}_${activeStaff.id}`;
                const path = `artifacts/${appId}/public/data/records_${activeStaff.id}`;

                try {
                    await db.collection(path).doc(docId).set({
                        type, 
                        label,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        dayKey: todayKey,
                        staffId: activeStaff.id
                    });
                    setSuccessMsg(`【${activeStaff.name}】登記 ${label} 成功！`);
                    setTimeout(() => setSuccessMsg(''), 3000);
                } catch (e) { 
                    console.error("打卡失敗:", e);
                }
                setIsActionLoading(false);
            };

            const daysInMonth = useMemo(() => {
                const year = currentTime.getFullYear();
                const month = currentTime.getMonth();
                const days = new Date(year, month + 1, 0).getDate();
                return Array.from({ length: days }, (_, i) => {
                    const date = new Date(year, month, i + 1);
                    return { day: i + 1, weekday: ['日', '一', '二', '三', '四', '五', '六'][date.getDay()], fullDate: date.toDateString() };
                });
            }, [currentTime]);

            if (loading) return (
                <div className="flex h-screen items-center justify-center font-black text-rose-400 italic">
                    <i className="fas fa-spinner fa-spin mr-2"></i> LOADING SYSTEM...
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-7xl mx-auto space-y-6">
                        
                        {/* 頂部導航 */}
                        <div className="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-[2.5rem] shadow-sm border-2 border-rose-100 gap-4">
                            <div className="flex items-center gap-4">
                                <div className={`w-14 h-14 ${activeStaff.avatarColor} rounded-2xl flex items-center justify-center text-white text-2xl font-black shadow-lg transform -rotate-3`}>
                                    {activeStaff.name[0]}
                                </div>
                                <div>
                                    <h1 className="text-2xl font-black text-rose-500 italic">智慧管理終端</h1>
                                    <p className="text-xs font-bold text-slate-400">當前人員: {activeStaff.name}</p>
                                </div>
                            </div>
                            <div className="text-center md:text-right">
                                <div className="text-3xl font-mono font-black text-slate-800">
                                    {currentTime.toLocaleTimeString('zh-TW', { hour12: false })}
                                </div>
                                <div className="text-[10px] font-black text-rose-300 tracking-[0.3em] uppercase">Cloud Realtime Sync</div>
                            </div>
                        </div>

                        {/* 統計面板 */}
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            {[
                                { title: '今日上班', val: stats.work, color: 'emerald' },
                                { title: '今日遲到', val: stats.late, color: 'rose' },
                                { title: '今日休假', val: stats.leave, color: 'sky' },
                                { title: '尚未打卡', val: stats.none, color: 'slate' }
                            ].map(item => (
                                <div key={item.title} className="bg-white p-5 rounded-3xl border-2 border-slate-50 shadow-sm">
                                    <p className={`text-[10px] font-black text-${item.color}-400 uppercase mb-1`}>{item.title}</p>
                                    <p className={`text-3xl font-black text-${item.color}-500`}>{item.val}<span className="text-sm ml-1 text-slate-300">人</span></p>
                                </div>
                            ))}
                        </div>

                        {successMsg && (
                            <div className="bg-emerald-500 text-white p-4 rounded-2xl font-bold shadow-lg text-center animate-bounce">
                                <i className="fas fa-check-circle mr-2"></i> {successMsg}
                            </div>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            {/* 成員選擇 */}
                            <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-rose-50">
                                <p className="text-xs font-black text-slate-300 uppercase tracking-widest mb-4"><i className="fas fa-users mr-2"></i>成員切換</p>
                                <div className="space-y-2">
                                    {STAFF_MEMBERS.map(s => (
                                        <button 
                                            key={s.id} 
                                            onClick={() => setActiveStaff(s)}
                                            className={`w-full text-left px-5 py-4 rounded-2xl font-black transition-all flex items-center justify-between ${activeStaff.id === s.id ? 'bg-rose-500 text-white shadow-xl scale-[1.02]' : 'bg-slate-50 text-slate-400 hover:bg-rose-50'}`}
                                        >
                                            {s.name}
                                            {activeStaff.id === s.id && <i className="fas fa-check-circle text-xs"></i>}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* 簽到 */}
                            <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-rose-50 flex flex-col justify-between">
                                <p className="text-xs font-black text-slate-300 uppercase tracking-widest mb-4"><i className="fas fa-clock mr-2"></i>打卡功能</p>
                                <button 
                                    onClick={() => handleAction('WORK', '上')}
                                    disabled={isActionLoading}
                                    className="w-full h-32 bg-emerald-400 hover:bg-emerald-500 text-white rounded-3xl font-black text-2xl shadow-xl transition-all active:scale-95 flex flex-col items-center justify-center gap-2 disabled:opacity-50"
                                >
                                    <i className="fas fa-hand-pointer text-3xl"></i>簽到
                                </button>
                                <p className="text-[10px] text-center text-slate-300 font-bold mt-4 italic">數據已與遠端同步</p>
                            </div>

                            {/* 報備 */}
                            <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-rose-50">
                                <p className="text-xs font-black text-slate-300 uppercase tracking-widest mb-4"><i className="fas fa-calendar-alt mr-2"></i>狀態報備</p>
                                <div className="grid grid-cols-2 gap-3">
                                    {LEAVE_TYPES.map(l => (
                                        <button 
                                            key={l.id} 
                                            onClick={() => handleAction('LEAVE', l.label)}
                                            disabled={isActionLoading}
                                            className={`py-4 rounded-2xl font-black border-2 transition-all ${l.bg} ${l.color} border-transparent hover:border-current active:scale-95 disabled:opacity-50`}
                                        >
                                            {l.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* 明細表 */}
                        <div className="bg-white rounded-[2.5rem] shadow-sm border-2 border-rose-50 overflow-hidden">
                            <div className="p-6 border-b border-rose-50 flex items-center gap-2">
                                <i className="fas fa-table text-rose-500"></i>
                                <h2 className="font-black text-slate-700 italic">全體考勤明細表</h2>
                            </div>
                            <div className="overflow-x-auto custom-scroll">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-slate-50/50">
                                            <th className="p-5 font-black text-slate-400 text-[10px] border-r sticky left-0 bg-slate-50 z-10 w-24">人員</th>
                                            {daysInMonth.map(d => (
                                                <th key={d.day} className="p-2 text-center border-r min-w-[45px]">
                                                    <div className="text-[8px] text-slate-300 font-bold uppercase">{d.weekday}</div>
                                                    <div className="text-xs font-black text-slate-500">{d.day}</div>
                                                </th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {STAFF_MEMBERS.map(staff => (
                                            <tr key={staff.id} className="border-t border-rose-50 hover:bg-rose-50/30">
                                                <td className="p-5 font-black text-sm border-r bg-white sticky left-0 z-10">{staff.name}</td>
                                                {daysInMonth.map(d => {
                                                    const rec = (allRecords[staff.id] || []).find(r => r.dayKey === d.fullDate);
                                                    return (
                                                        <td key={d.day} className="p-1 border-r text-center">
                                                            {rec ? (
                                                                <div className={`w-9 h-9 mx-auto flex items-center justify-center rounded-xl text-xs font-black shadow-sm ${
                                                                    rec.label === '上' ? 'bg-emerald-400 text-white' : 
                                                                    rec.label === '遲' ? 'bg-rose-400 text-white' : 
                                                                    rec.label === '加' ? 'bg-emerald-600 text-white' :
                                                                    'bg-sky-400 text-white'
                                                                }`}>
                                                                    {rec.label}
                                                                </div>
                                                            ) : <div className="text-slate-100 font-black text-[10px]">-</div>}
                                                        </td>
                                                    );
                                                })}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
