<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的雲端打卡通報台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FFF5F7; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .main-card { background: white; border-radius: 40px; border: 4px solid #FFE4E6; width: 92%; max-width: 400px; padding: 32px; box-shadow: 0 20px 50px rgba(251, 113, 133, 0.15); }
        .btn-check { transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; border-bottom-width: 6px; }
        .btn-check:active { transform: translateY(4px); border-bottom-width: 2px; opacity: 0.9; }
    </style>
</head>
<body>
    <div class="main-card">
        <div class="text-center mb-8">
            <div class="inline-block bg-rose-500 text-white px-5 py-1.5 rounded-full text-[10px] font-black tracking-widest mb-3 shadow-md animate-pulse">
                <i class="fab fa-telegram-plane mr-1"></i> 雲端連線中
            </div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">打卡通報系統</h1>
            <p class="text-slate-400 text-xs mt-2 font-bold italic">Hello, 元！系統已準備就緒</p>
        </div>

        <div id="displayTime" class="text-5xl font-mono font-black text-center mb-10 text-slate-800 tracking-tighter drop-shadow-sm">00:00:00</div>
        
        <div class="grid grid-cols-1 gap-5">
            <button onclick="sendCheckIn('上班 ☀️')" class="btn-check bg-emerald-400 border-emerald-600 hover:bg-emerald-500 text-white py-5 rounded-[2rem] font-black text-2xl shadow-xl flex items-center justify-center gap-4">
                <i class="fas fa-sun text-3xl"></i>
                <span>簽到上班</span>
            </button>
            <button onclick="sendCheckIn('下班 🌙')" class="btn-check bg-rose-400 border-rose-600 hover:bg-rose-500 text-white py-5 rounded-[2rem] font-black text-2xl shadow-xl flex items-center justify-center gap-4">
                <i class="fas fa-moon text-3xl"></i>
                <span>簽退下班</span>
            </button>
        </div>

        <div id="statusBox" class="mt-8 text-center text-sm font-bold min-h-[20px] transition-all"></div>

        <div class="mt-8 pt-6 border-t-4 border-dashed border-rose-50">
            <div class="flex justify-between items-end mb-4 px-1">
                <h2 class="text-xs font-black text-slate-300 uppercase tracking-widest">最近打卡紀錄</h2>
                <button onclick="resetLogs()" class="text-[9px] font-black text-rose-200 hover:text-rose-500 transition-colors uppercase">清除</button>
            </div>
            <div id="logContainer" class="space-y-2 h-32 overflow-y-auto pr-2 text-[13px] font-medium text-slate-500"></div>
        </div>
    </div>

    <script>
        // 自動填入你的資訊
        const TELEGRAM_TOKEN = "8356996974:AAHia8miJbschS8rsJFW76XDTnGZ39emHhU";
        const MY_CHAT_ID = "1460146542"; 

        function tick() {
            const now = new Date();
            document.getElementById('displayTime').innerText = now.toLocaleTimeString('zh-TW', { hour12: false });
        }
        setInterval(tick, 1000);
        tick();

        let myLogs = JSON.parse(localStorage.getItem('attendance_logs_final') || '[]');
        updateLogView();

        async function sendCheckIn(actionType) {
            const now = new Date();
            const dateStr = `${now.getMonth() + 1}/${now.getDate()}`;
            const timeStr = now.toLocaleTimeString('zh-TW', { hour12: false });

            const newEntry = { date: dateStr, time: timeStr, type: actionType };
            myLogs.unshift(newEntry);
            localStorage.setItem('attendance_logs_final', JSON.stringify(myLogs));
            updateLogView();

            updateStatus('🚀 發送 Telegram 通報...', 'text-slate-400');
            
            const textContent = `📢 打卡通知\n━━━━━━━━━━━━━\n👤 使用者：元\n📅 日期：${dateStr}\n⏰ 時間：${timeStr}\n✅ 動作：${actionType}\n━━━━━━━━━━━━━`;
            const telegramUrl = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${MY_CHAT_ID}&text=${encodeURIComponent(textContent)}`;

            try {
                const res = await fetch(telegramUrl);
                if (res.ok) {
                    updateStatus('✅ 通報成功！請查看手機', 'text-emerald-500');
                } else {
                    updateStatus('❌ 發送失敗', 'text-rose-500');
                }
            } catch (e) {
                updateStatus('❌ 網路失敗', 'text-rose-500');
            }
        }

        function updateLogView() {
            const container = document.getElementById('logContainer');
            container.innerHTML = myLogs.map(item => `
                <div class="flex justify-between items-center bg-rose-50/50 p-2.5 rounded-xl border border-rose-100">
                    <span class="font-black text-slate-600 text-sm">${item.type}</span>
                    <span class="text-[11px] font-mono font-bold text-rose-300">${item.date} ${item.time}</span>
                </div>
            `).join('');
        }

        function resetLogs() {
            if(confirm('確定清除紀錄？')) {
                myLogs = [];
                localStorage.removeItem('attendance_logs_final');
                updateLogView();
            }
        }

        function updateStatus(msg, colorClass) {
            const box = document.getElementById('statusBox');
            box.innerText = msg;
            box.className = `mt-8 text-center text-sm font-bold min-h-[20px] transition-all ${colorClass}`;
            setTimeout(() => { if(box.innerText === msg) box.innerText = ''; }, 4000);
        }
    </script>
</body>
</html>
